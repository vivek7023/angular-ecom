<div class="product-form-container">
  <div class="product-form-card">
    <h2 class="form-title">Update Product</h2>
    <p class="form-subtitle">Modify the product details below to update this catalog item</p>
    
    <form #updateProductForm="ngForm" (ngSubmit)="updateProductData(updateProductForm.value)" class="app-form" noValidate>
      <div class="form-grid">
        <div class="form-group">
          <label for="updatePname" class="form-label">Product Name</label>
          <input type="text" id="updatePname" name="pname" ngModel="{{product?.pname}}" placeholder="enter product name" required #pnameRef="ngModel" class="form-input" [class.input-error]="pnameRef.invalid && (pnameRef.dirty || pnameRef.touched)">
          <span class="error-msg" *ngIf="pnameRef.invalid && (pnameRef.dirty || pnameRef.touched)">Product name is required.</span>
        </div>

        <div class="form-group">
          <label for="updatePprice" class="form-label">Price (INR)</label>
          <input type="number" id="updatePprice" name="pprice" ngModel="{{product?.pprice}}" placeholder="enter product price" required min="1" #ppriceRef="ngModel" class="form-input" [class.input-error]="ppriceRef.invalid && (ppriceRef.dirty || ppriceRef.touched)">
          <div class="error-msg" *ngIf="ppriceRef.invalid && (ppriceRef.dirty || ppriceRef.touched)">
            <span *ngIf="ppriceRef.errors?.['required']">Price is required.</span>
            <span *ngIf="ppriceRef.errors?.['min']">Price must be greater than 0.</span>
          </div>
        </div>

        <div class="form-group">
          <label for="updatePcategory" class="form-label">Category</label>
          <input type="text" id="updatePcategory" name="pcategory" ngModel="{{product?.pcategory}}" placeholder="enter product category" required #pcategoryRef="ngModel" class="form-input" [class.input-error]="pcategoryRef.invalid && (pcategoryRef.dirty || pcategoryRef.touched)">
          <span class="error-msg" *ngIf="pcategoryRef.invalid && (pcategoryRef.dirty || pcategoryRef.touched)">Category is required.</span>
        </div>

        <div class="form-group">
          <label for="updatePcolor" class="form-label">Color</label>
          <input type="text" id="updatePcolor" name="pcolor" ngModel="{{product?.pcolor}}" placeholder="enter product color" required #pcolorRef="ngModel" class="form-input" [class.input-error]="pcolorRef.invalid && (pcolorRef.dirty || pcolorRef.touched)">
          <span class="error-msg" *ngIf="pcolorRef.invalid && (pcolorRef.dirty || pcolorRef.touched)">Color is required.</span>
        </div>
      </div>

      <div class="form-group">
        <label for="updatePdescription" class="form-label">Product Description</label>
        <textarea id="updatePdescription" name="pdescription" ngModel="{{product?.pdescription}}" placeholder="enter product description" required #pdescriptionRef="ngModel" class="form-textarea" [class.input-error]="pdescriptionRef.invalid && (pdescriptionRef.dirty || pdescriptionRef.touched)" rows="3"></textarea>
        <span class="error-msg" *ngIf="pdescriptionRef.invalid && (pdescriptionRef.dirty || pdescriptionRef.touched)">Description is required.</span>
      </div>

      <div class="form-group">
        <label for="updatePimageurl" class="form-label">Image URL</label>
        <input type="text" id="updatePimageurl" name="pimageurl" ngModel="{{product?.pimageurl}}" placeholder="enter product image url" required pattern="https?://.+" #pimageurlRef="ngModel" class="form-input" [class.input-error]="pimageurlRef.invalid && (pimageurlRef.dirty || pimageurlRef.touched)">
        <div class="error-msg" *ngIf="pimageurlRef.invalid && (pimageurlRef.dirty || pimageurlRef.touched)">
          <span *ngIf="pimageurlRef.errors?.['required']">Image URL is required.</span>
          <span *ngIf="pimageurlRef.errors?.['pattern']">Please enter a valid HTTP/HTTPS image URL.</span>
        </div>
      </div>

      <button type="submit" [disabled]="!updateProductForm.valid" class="btn-primary">Update Product Details</button>
    </form>
  </div>
</div>
