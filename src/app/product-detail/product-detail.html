<div class="product-detail-container">
  @if (product) {
    <div class="product-detail-card">
      <div class="back-navigation">
        <a routerLink="/" class="back-link">
          <span class="back-icon">←</span> Back to Shop
        </a>
      </div>

      <div class="card-layout">
        <!-- Image Section -->
        <div class="product-image-container">
          <span class="category-badge">{{product.pcategory}}</span>
          <div class="image-wrapper">
            <img [src]="product.pimageurl" [alt]="product.pname" class="product-image" onerror="this.src='favicon.ico'">
          </div>
        </div>

        <!-- Info / Action Section -->
        <div class="product-info-container">
          <div class="product-header">
            <h1 class="product-title">{{product.pname}}</h1>
            
            <div class="product-meta">
              <span class="meta-item color-meta">
                <span class="color-dot" [style.background-color]="product.pcolor"></span>
                <span class="meta-text">{{product.pcolor}}</span>
              </span>
              <span class="meta-divider">•</span>
              <span class="meta-item category-meta">
                <span class="category-text">{{product.pcategory}}</span>
              </span>
            </div>
          </div>

          <div class="product-price-block">
            <span class="price-symbol">₹</span>
            <span class="price-amount">{{product.pprice}}</span>
          </div>

          <div class="product-description-block">
            <h3 class="section-subtitle">Product Highlights</h3>
            <p class="description-text">{{product.pdescription}}</p>
          </div>

          <div class="product-actions">
            @if (!removeCart) {
              <button (click)="addToCart()" class="btn-primary btn-add-cart">
                <span class="btn-icon">🛒</span> Add to Cart
              </button>
            } @else {
              <button (click)="removeFromCart()" class="btn-primary btn-add-cart" style="background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%); box-shadow: 0 4px 14px rgba(239, 68, 68, 0.25);">
                <span class="btn-icon">🗑️</span> Remove from Cart
              </button>
            }
            <button class="btn-secondary btn-buy-now">
              Buy Now
            </button>
          </div>
        </div>
      </div>
    </div>
  } @else {
    <div class="loading-container">
      <div class="loader-spinner"></div>
      <p class="loader-text">Loading product details...</p>
    </div>
  }
</div>
